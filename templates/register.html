{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block content %}
<div class="card center auth-card">
    <section class="auth-panel">
        <div class="auth-panel-inner">
            <div class="auth-brand">
                <div class="auth-logo-wrap">
                    <img src="{{ url_for('static', filename='img/icone.png') }}">
                </div>
                <span>Quiz Master</span>
            </div>
            <span class="auth-panel-tag">Novo acesso</span>
            <h2 class="auth-headline">Criar conta</h2>
            <p class="muted auth-subtitle">Preencha os dados para acessar seu painel.</p>

            {% if erro %}
            <div class="error">{{ erro }}</div>
            {% endif %}

            <form method="POST" class="grid auth-form">
                <div class="field">
                    <label>Nome</label>
                    <input type="text" name="nome" placeholder="Seu nome" required>
                </div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="seu@email.com" required>
                </div>
                <div style="position: relative;">
    <input type="password" id="senha1" name="senha" placeholder="Defina uma senha" required
           style="width: 100%; padding-right: 35px;">

    <span onclick="toggleSenha('senha1','icon1')" 
          style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
                 cursor: pointer; opacity: 0.5; transition: 0.3s;"
          onmouseover="this.style.opacity='1'" 
          onmouseout="this.style.opacity='0.5'">
        
        <i id="icon1" class="fa-solid fa-eye"></i>
    </span>
</div>
                <button type="submit" class="btn">Cadastrar</button>
            </form>

            <p class="muted auth-footer">
                Já tem conta?
                <a href="{{ url_for('login') }}">Fazer login</a>
            </p>
        </div>
    </section>
</div>
<script>
function toggleSenha(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}
</script>
{% endblock %}
